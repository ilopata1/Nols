<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PAS">
<meta name="theme-color" content="#0d1b2e">
<link rel="manifest" href="manifest.json">
<title>NOLS PAS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  :root {
    --bg:          #0d1b2e;
    --surface:     #162338;
    --surface2:    #1e2f47;
    --border:      #2a3f5f;
    --border-hi:   #3a5478;
    --accent:      #f47920;
    --accent-dim:  #b85c18;
    --warn:        #e03e3e;
    --text:        #ffffff;
    --text-body:   #e8eef5;
    --text-dim:    #7a9cc0;
    --mono:        'Share Tech Mono', monospace;
    --sans:        'Barlow Condensed', sans-serif;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bot:    env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
    background: #0a1524;
  }

  .logo { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 3px; }
  .step-counter { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }

  .progress-track {
    display: flex;
    gap: 3px;
    padding: 8px 16px;
    flex-shrink: 0;
    background: #0a1524;
  }

  .pip {
    height: 4px; flex: 1; background: var(--border);
    border-radius: 2px; transition: background 0.3s; cursor: pointer;
  }
  .pip.done   { background: var(--accent-dim); }
  .pip.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  main {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 14px 16px;
  }

  .phase-label {
    font-family: var(--mono); font-size: 10px; color: var(--accent);
    letter-spacing: 4px; text-transform: uppercase; padding: 14px 0 4px;
  }
  .phase-title {
    font-family: var(--sans); font-weight: 700; font-size: 40px;
    line-height: 0.95; color: #fff; margin-bottom: 4px; letter-spacing: -0.5px;
  }
  .phase-subtitle {
    font-size: 13px; font-weight: 400; color: var(--text-dim);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
  }

  .checklist { display: flex; flex-direction: column; gap: 6px; }

  .item {
    display: flex; flex-direction: column;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; transition: border-color 0.2s;
  }
  .item-row { display: flex; align-items: stretch; cursor: pointer; }

  .item.checked { border-color: var(--accent-dim); background: #0f2818; }
  .item.checked .item-check { background: var(--accent); }
  .item.checked .item-label { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--accent-dim); }

  .item-check {
    width: 50px; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; background: var(--surface2);
    transition: background 0.2s; border-right: 1px solid var(--border);
  }
  .item-check svg { width: 22px; height: 22px; }
  .item-check .unchecked-icon { display: block; color: var(--text-dim); }
  .item-check .checked-icon   { display: none; color: #fff; }
  .item.checked .item-check .unchecked-icon { display: none; }
  .item.checked .item-check .checked-icon   { display: block; }

  .item-body { flex: 1; padding: 11px 10px; min-width: 0; }
  .item-tag { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 1px; }
  .item-label { font-family: var(--sans); font-weight: 600; font-size: 19px; line-height: 1.15; color: var(--text); transition: color 0.2s; }

  .item-expand {
    width: 40px; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); font-size: 20px;
    transition: color 0.2s, transform 0.25s; border-left: 1px solid var(--border); cursor: pointer;
  }
  .item.open .item-expand { color: var(--accent); transform: rotate(90deg); }

  .item-detail {
    display: none; padding: 10px 14px 12px;
    background: #0a1e38; border-top: 1px solid var(--border-hi);
  }
  .item.open .item-detail { display: block; }

  .item-detail ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
  .item-detail ul li {
    display: flex; gap: 8px; font-family: var(--sans);
    font-size: 15px; font-weight: 400; line-height: 1.4; color: var(--text-body);
  }
  .item-detail ul li::before { content: '▸'; color: var(--accent); flex-shrink: 0; font-size: 12px; margin-top: 2px; }

  /* warn = red left border for life-threat steps */
  .item.warn { border-left: 3px solid var(--warn); }
  .item.warn .item-tag { color: #ff7070; }
  .item.warn.checked { border-left-color: var(--accent-dim); }

  /* section sub-header inside a phase */
  .section-head {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    letter-spacing: 3px; text-transform: uppercase;
    padding: 12px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 6px;
  }

  footer {
    display: flex; gap: 8px; padding: 10px 14px;
    border-top: 1px solid var(--border); flex-shrink: 0; background: #0a1524;
  }

  .btn {
    flex: 1; padding: 15px; border: 1px solid var(--border-hi);
    border-radius: 8px; background: var(--surface2); color: var(--text-body);
    font-family: var(--sans); font-weight: 600; font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s; -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.25; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); flex: 2; font-size: 15px; font-weight: 700; }
  .btn-icon { flex: 0 0 52px; font-size: 20px; letter-spacing: 0; padding: 15px 0; }

  #complete-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; text-align: center; padding: 32px 24px; gap: 10px;
  }
  .complete-icon {
    width: 80px; height: 80px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff; margin-bottom: 8px;
  }
  .complete-title { font-weight: 700; font-size: 34px; color: #fff; }
  .complete-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; font-family: var(--mono); }
  .complete-time { font-family: var(--mono); font-size: 36px; color: var(--accent); margin: 4px 0 16px; }
  .complete-actions { display: flex; flex-direction: column; gap: 8px; width: 100%; }

  /* ── GATE BANNER ── */
  .gate-banner {
    border: 2px solid var(--warn);
    border-radius: 8px;
    background: #1a0a0a;
    padding: 12px 14px;
    margin-bottom: 14px;
  }

  .gate-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--warn);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .gate-conditions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .gate-condition {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 16px;
    color: var(--text-body);
  }

  .gate-condition .gate-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    flex-shrink: 0;
  }

  .gate-footer {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--warn);
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid #3a1010;
    letter-spacing: 1px;
  }

  main::-webkit-scrollbar { width: 3px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">NOLS · PAS</span>
    <span class="step-counter" id="step-counter">01 / 07</span>
  </header>
  <div class="progress-track" id="progress-track"></div>
  <main id="main-content"></main>
  <footer id="footer">
    <button class="btn btn-icon" id="btn-back" onclick="nav(-1)">←</button>
    <button class="btn btn-primary" id="btn-next" onclick="nav(1)">NEXT</button>
    <button class="btn btn-icon" onclick="resetAll()" title="New patient">↺</button>
  </footer>
  <div id="complete-screen">
    <div class="complete-icon">✓</div>
    <div class="complete-title">Assessment Complete</div>
    <div class="complete-sub">Elapsed Time</div>
    <div class="complete-time" id="elapsed-time">00:00</div>
    <div class="complete-actions">
      <button class="btn btn-primary" onclick="resetAll()">NEW PATIENT</button>
      <button class="btn" onclick="reviewAll()">REVIEW</button>
    </div>
  </div>
</div>

<script>
// Each phase can have items[] and/or sections[] (named groups of items)
const PHASES = [
  {
    id: 'scene',
    label: '01 · SCENE SIZE-UP',
    title: 'Scene\nSize-Up',
    subtitle: 'Before you touch the patient',
    items: [
      {
        tag: '1 · SAFETY',
        label: 'Scene Safety / Identify Hazards',
        detail: [
          'Hazards to YOU first, then team, bystanders, patient',
          'Traffic, rockfall, ice, electricity, moving water, wildlife',
          'Is the mechanism still active?',
          'Make scene safe — move patient only if immediate danger',
          'Your safety = your ability to help'
        ]
      },
      {
        tag: '2 · MOI/HPI',
        label: 'Mechanism of Injury / History of Present Illness',
        detail: [
          'Trauma: how? Height, speed, force, penetrating vs blunt',
          'Medical (HPI): onset, duration, progression of symptoms',
          'MOI guides spinal precautions decision',
          'Ask bystanders if patient unresponsive',
          'Look for clues: patient position, damaged equipment, surroundings'
        ]
      },
      {
        tag: '3 · BSI',
        label: 'Establish BSI / Don PPE',
        detail: [
          'Body Substance Isolation — before patient contact',
          'Gloves always; eye protection if splash risk',
          'Mask if respiratory concern',
          'If no gloves: improvise (bags, extra clothing)'
        ]
      },
      {
        tag: '4 · PATIENTS',
        label: '# of Patients / Consider Resources',
        detail: [
          'Look beyond the obvious victim',
          'Multiple patients → triage now (START/JumpSTART)',
          'Resources: comms, kit, AED, O2, distance to care',
          'Activate EMS early — don\'t wait to confirm severity'
        ]
      },
      {
        tag: '5 · IMPRESSION',
        label: 'General Impression of Seriousness',
        detail: [
          'Is this sick or not sick? Trust your gut',
          'Chief complaint from across the room',
          'Appearance: position, skin color, level of distress',
          'Sets urgency: immediate, delayed, or routine'
        ]
      }
    ]
  },
  {
    id: 'initial',
    label: '02 · INITIAL ASSESSMENT',
    title: 'Initial\nAssessment',
    subtitle: 'Consent → Spine → ABCDE',
    items: [
      {
        tag: 'INTRO',
        label: 'Intro & Consent',
        detail: [
          'Introduce yourself: name and level of training',
          'Ask: "May I help you?" — obtain expressed consent',
          'Unresponsive or altered → implied consent applies',
          'Establish responsiveness: call name, painful stimulus if needed'
        ]
      },
      {
        tag: 'SPINE',
        label: 'If MOI for Spine — Protect the Spine',
        warn: true,
        detail: [
          'Decision point: does MOI suggest spinal injury?',
          'Significant trauma, axial load, altered LOC, high-speed MVC → YES',
          'If yes: manually stabilize head/neck NOW, before ABCDE',
          'Maintain until cleared by full assessment or EMS'
        ]
      },
      {
        tag: 'A',
        label: 'Airway',
        warn: true,
        detail: [
          'Open and clear? Talking = patent airway',
          'Unconscious → head-tilt/chin-lift; trauma → jaw thrust',
          'Sounds: gurgling = fluid; stridor = partial obstruction',
          'Clear with finger sweep, suction, or positioning',
          'Recovery position if unconscious and breathing adequately'
        ]
      },
      {
        tag: 'B',
        label: 'Breathing',
        warn: true,
        detail: [
          'Rate: normal adult 12–20/min; look, listen, feel',
          'Depth and effort — labored? Accessory muscles?',
          'Bilateral chest rise equal?',
          'Open chest wound → vented occlusive dressing',
          'Tension pneumo: absent sounds, tracheal deviation, JVD, shock'
        ]
      },
      {
        tag: 'C',
        label: 'Circulation / Bleeding',
        warn: true,
        detail: [
          'LIFE-THREATENING HEMORRHAGE → STOP IT FIRST',
          'Direct pressure → wound packing → tourniquet',
          'Tourniquet: 2–3" above wound, note time on skin',
          'Radial pulse: rate, strength, rhythm',
          'Shock signs: pale/cool/clammy, altered LOC, weak rapid pulse'
        ]
      },
      {
        tag: 'D',
        label: 'Decision about Mechanism of Injury',
        warn: true,
        detail: [
          'AVPU: Alert / Voice / Pain / Unresponsive',
          'Confirm or reassess spinal precautions decision',
          'Document baseline LOC — changes matter most'
        ]
      },
      {
        tag: 'E',
        label: 'Expose / Treat Life-Threatening Injuries',
        warn: true,
        detail: [
          'Cut away clothing to find hidden injuries',
          'Check torso front/back, axillae, groin, scalp',
          'Treat any life threats found immediately',
          'Prevent hypothermia — insulate below and above, replace wet clothes'
        ]
      }
    ]
  },
  {
    id: 'h2t',
    label: '03 · PHYSICAL EXAM',
    title: 'Head\nto Toe',
    subtitle: 'Look · Feel · Ask at each region',
    items: [
      {
        tag: 'HEAD',
        label: 'Head, Face, & Neck',
        detail: [
          'DCAP-BTLS at each area: Deformity, Contusions, Abrasions, Punctures, Burns, Tenderness, Lacerations, Swelling',
          'Scalp: step-offs, boggy areas, bleeding',
          'Eyes: PERRL — Pupils Equal, Round, Reactive to Light',
          'Face: symmetry, step-offs, tenderness',
          'Neck: trachea midline? JVD? C-spine midline tenderness?'
        ]
      },
      {
        tag: 'CLAVICLES',
        label: 'Clavicles & Shoulders',
        detail: [
          'Palpate entire length of both clavicles for deformity or tenderness',
          'Shoulder girdle: step-offs, point tenderness, range of motion if indicated',
          'Crepitus on palpation → fracture until proven otherwise'
        ]
      },
      {
        tag: 'CHEST',
        label: 'Chest',
        detail: [
          'Paradoxical movement → flail segment',
          'Breath sounds: bilateral and equal',
          'Rib tenderness: compress lateral-to-medial AND anterior-posterior',
          'Subcutaneous emphysema: crackling under skin',
          'Penetrating wound → vented occlusive dressing'
        ]
      },
      {
        tag: 'ABDOMEN',
        label: 'Abdomen',
        detail: [
          'Palpate all 4 quadrants: RUQ, LUQ, RLQ, LLQ',
          'Rigidity or guarding → peritoneal irritation, internal bleeding',
          'Distension → internal bleeding or hollow organ rupture',
          'Evisceration: moist sterile cover — do NOT replace',
          'Impaled objects: stabilize in place, do NOT remove'
        ]
      },
      {
        tag: 'PELVIS',
        label: 'Pelvis',
        detail: [
          'Compress iliac crests medially and posteriorly — ONCE only',
          'Instability = massive hemorrhage — do NOT repeat',
          'Apply pelvic binder if available and unstable',
          'Priapism → suspect spinal cord injury'
        ]
      },
      {
        tag: 'LEGS & FEET',
        label: 'Legs & Feet',
        detail: [
          'DCAP-BTLS along full length of each leg',
          'Deformity, angulation, swelling, point tenderness',
          'Distal pulse: dorsalis pedis and posterior tibial'
        ]
      },
      {
        tag: 'CSM: FEET',
        label: 'CSM: Feet',
        detail: [
          'Circulation: dorsalis pedis pulse present and equal bilaterally?',
          'Sensation: light touch dorsum and plantar surface of foot',
          'Motor: plantar flexion and dorsiflexion against resistance'
        ]
      },
      {
        tag: 'ARMS & HANDS',
        label: 'Arms & Hands',
        detail: [
          'DCAP-BTLS along full length of each arm',
          'Deformity, angulation, swelling, point tenderness',
          'Distal pulse: radial pulse present and equal bilaterally?'
        ]
      },
      {
        tag: 'CSM: HANDS',
        label: 'CSM: Hands',
        detail: [
          'Circulation: radial pulse — rate, strength, equal bilaterally?',
          'Sensation: light touch dorsum and palm of hand',
          'Motor: grip strength equal bilaterally; finger extension'
        ]
      },
      {
        tag: 'SPINE & BACK',
        label: 'Spine & Back',
        detail: [
          'Log-roll with spinal precautions if mechanism warrants',
          'Palpate each spinous process: midline posterior tenderness?',
          'Step-offs or gaps between vertebrae',
          'Inspect posterior thorax, flanks, posterior pelvis, buttocks'
        ]
      }
    ]
  },
  {
    id: 'vitals',
    label: '04 · VITAL SIGNS',
    title: 'Vital\nSigns',
    subtitle: 'Baseline → repeat every 15–30 min',
    items: [
      {
        tag: 'LOC',
        label: 'Level of Responsiveness',
        detail: [
          'AVPU: Alert / Voice / Pain / Unresponsive',
          'Orientation: person, place, time, event (A&O ×4)',
          'GCS: Eyes (1–4) + Verbal (1–5) + Motor (1–6)',
          'LOC trend is the single most important vital sign'
        ]
      },
      {
        tag: 'HR',
        label: 'Heart Rate, Rhythm, & Quality',
        detail: [
          'Rate: normal adult 60–100 bpm',
          'Rhythm: regular or irregular',
          'Quality: strong/bounding, weak/thready',
          'Absent radial → systolic approx <80 mmHg',
          'Tachycardia: pain, fear, shock, hypoxia'
        ]
      },
      {
        tag: 'RR',
        label: 'Respiratory Rate, Rhythm, & Effort',
        detail: [
          'Normal adult: 12–20/min — count without patient knowing',
          'Depth: shallow, normal, deep',
          'Effort: labored, accessory muscle use, nasal flaring',
          '>30 or <8 → serious compromise'
        ]
      },
      {
        tag: 'SKIN',
        label: 'Skin Color, Temperature, & Moisture',
        detail: [
          'Color: pink (normal), pale, cyanotic, flushed, mottled',
          'Temperature: warm (normal), hot, cool, cold',
          'Moisture: dry (normal), moist, diaphoretic',
          'Cool + pale + diaphoretic = shock until proven otherwise'
        ]
      },
      {
        tag: 'BP',
        label: 'Blood Pressure',
        detail: [
          'Normal adult: ~120/80 mmHg',
          'Hypotension: systolic <90 → treat for shock',
          'Field estimate: radial present ≈ systolic >80; femoral ≈ >70; carotid ≈ >60',
          'Trending down more significant than single reading'
        ]
      },
      {
        tag: 'PUPILS',
        label: 'Pupils',
        detail: [
          'Normal: 2–6mm, equal, brisk reaction to light (PERRL)',
          'Unequal → herniation, direct trauma, prior surgery',
          'Fixed + bilateral dilated → cardiac arrest, severe anoxia',
          'Pinpoint bilateral → opioid OD, pons injury'
        ]
      },
      {
        tag: 'TEMP',
        label: 'Temperature',
        detail: [
          'Hypothermia: Mild 32–35°C / Moderate 28–32°C / Severe <28°C',
          'Mild: shivering, impaired fine motor',
          'Moderate: shivering stops, paradoxical undressing, altered LOC',
          'Severe: rigid, unconscious — handle gently (VF risk)',
          'Heat stroke: altered LOC + hyperthermia = emergency'
        ]
      }
    ]
  },
  {
    id: 'history',
    label: '05 · PATIENT HISTORY',
    title: 'Patient\nHistory',
    subtitle: 'Subjective — patient / bystander',
    items: [
      {
        tag: 'AGE',
        label: 'Age',
        detail: [
          'Note age — adjust vital sign normals for pediatric (<16) and geriatric (>65)',
          'Pediatric: higher HR/RR normal, lower BP normal',
          'Geriatric: may not show classic shock signs; medications complicate picture'
        ]
      },
      {
        tag: 'SEX',
        label: 'Sex',
        detail: [
          'Biological sex relevant for anatomical considerations',
          'Women of childbearing age: always consider ectopic pregnancy',
          'Last menstrual period — ask as part of Last Ins & Outs'
        ]
      },
      {
        tag: 'CHIEF COMPLAINT',
        label: 'Chief Complaint',
        detail: [
          'Patient\'s primary problem in their own words — quoted if possible',
          '"What is bothering you most right now?"',
          'Do not interpret or reframe — record exactly what they say'
        ]
      },
      {
        tag: 'SYMPTOMS',
        label: 'Symptoms',
        detail: [
          'Additional symptoms beyond chief complaint',
          'Associated: nausea, vomiting, dizziness, weakness, numbness, SOB',
          'Constant or intermittent? Getting better or worse?'
        ]
      },
      {
        tag: 'ONSET',
        label: 'Onset',
        detail: [
          'When did it start? Sudden or gradual?',
          'What were they doing when it began?',
          'Sudden onset of severe symptoms → serious until proven otherwise'
        ]
      },
      {
        tag: 'PROVOKES / PALLIATES',
        label: 'Provokes / Palliates',
        detail: [
          'What makes it worse? (movement, breathing, eating, position)',
          'What makes it better? (rest, position change, medication)',
          'Pleuritic pain (worse with breath) → pneumo, PE, rib fracture',
          'Cardiac pain often not relieved by position change'
        ]
      },
      {
        tag: 'QUALITY',
        label: 'Quality',
        detail: [
          'Have patient describe in their own words — do not suggest descriptors',
          'Sharp, dull, aching, burning, crushing, tearing, throbbing, pressure',
          'Crushing/pressure → cardiac; tearing → aortic dissection; burning → GI/nerve'
        ]
      },
      {
        tag: 'RADIATION / REGION',
        label: 'Radiation / Region / Referred',
        detail: [
          'Where exactly is the pain? Can they point to it with one finger?',
          'Does it spread or radiate anywhere?',
          'Cardiac → left arm, jaw, shoulder, back',
          'Kidney stone → flank to groin; Ectopic → shoulder tip (referred)'
        ]
      },
      {
        tag: 'SEVERITY',
        label: 'Severity',
        detail: [
          '0–10 scale: 0 = none, 10 = worst pain imaginable',
          'Most useful for trending — better, worse, or same?',
          'Note at rest vs with movement'
        ]
      },
      {
        tag: 'TIME / TREND',
        label: 'Time / Trend',
        detail: [
          'How long has it been going on?',
          'Continuous or episodic? Duration of episodes?',
          'Improving, worsening, or stable since onset?',
          'Prior similar episodes? How resolved?'
        ]
      },
      {
        tag: 'A · ALLERGIES',
        label: 'Allergies',
        detail: [
          'Medications — antibiotics, NSAIDs, sulfa drugs, contrast dye',
          'Foods: nuts, shellfish; Environmental: bees, latex, plants',
          'Type of reaction: rash/hives, GI upset, or anaphylaxis?'
        ]
      },
      {
        tag: 'M · MEDICATIONS',
        label: 'Medications',
        detail: [
          'All prescriptions — especially blood thinners, beta blockers, insulin, seizure meds',
          'OTC: aspirin, ibuprofen, antihistamines',
          'Supplements, herbal remedies',
          'Last dose? Any recent changes or missed doses?'
        ]
      },
      {
        tag: 'P · PMH',
        label: 'Pertinent Medical History',
        detail: [
          'Cardiac, diabetes, seizures, asthma, COPD, bleeding disorders',
          'Prior surgeries or hospitalizations',
          'Had this happen before? Prior diagnosis?',
          'Medical alert bracelet or wallet card?'
        ]
      },
      {
        tag: 'L · LAST INS & OUTS',
        label: 'Last Ins & Outs',
        detail: [
          'Last food: what, when, how much',
          'Last fluid: type and volume; any alcohol?',
          'Last urination: color and amount (dark = dehydrated; red = blood)',
          'Last bowel movement; any vomiting or diarrhea?',
          'Last menstrual period (women of childbearing age)'
        ]
      },
      {
        tag: 'E · EVENTS',
        label: 'Events Leading Up',
        detail: [
          'What were they doing before the incident?',
          'Any unusual exertion, exposure, food, or environmental change?',
          'Prodromal symptoms: dizziness, chest tightness, tunnel vision before collapse?',
          'Witness account: what did they see? Position found in?'
        ]
      }
    ]
  },
  {
    id: 'spine',
    label: '06 · FOCUSED SPINE ASSESSMENT',
    gate: ['Wilderness context', 'Complete PAS performed', 'No signs or symptoms of spine injury'],
    title: 'Spine\nAssessment',
    subtitle: 'Clear or maintain precautions',
    items: [
      {
        tag: 'LOR',
        label: 'Level of Responsiveness',
        detail: [
          'Patient must be Alert and oriented ×4 to be cleared',
          'Any altered LOC → maintain spinal precautions, cannot clear',
          'Document LOC at time of spine assessment'
        ]
      },
      {
        tag: 'SOBER',
        label: 'Sober',
        detail: [
          'No intoxication from alcohol, drugs, or medications',
          'Intoxication masks pain response — cannot clear spine if impaired',
          'Recreational drugs, prescription sedatives, or heavy analgesics all count'
        ]
      },
      {
        tag: 'NOT DISTRACTED',
        label: 'Not Distracted',
        detail: [
          'No distracting injury — significant pain elsewhere may mask spinal tenderness',
          'Long bone fractures, burns, abdominal injuries = distracting',
          'Cannot clear spine in presence of distracting injury'
        ]
      },
      {
        tag: 'CSM ×4',
        label: 'CSM ×4 — Neuro Check',
        detail: [
          'Circulation, Sensation, Motor in all four extremities',
          'Any deficit, weakness, or asymmetry → maintain precautions',
          'Paresthesias (tingling/numbness) → positive finding, do not clear'
        ]
      },
      {
        tag: 'SPINE PAIN',
        label: 'Spine Pain / Tenderness',
        detail: [
          'Palpate entire posterior midline spine — occiput to sacrum',
          'Any midline tenderness → maintain precautions, cannot clear',
          'Pain with axial loading or range of motion → positive',
          'If all criteria met and no tenderness: may clear spine in field'
        ]
      }
    ]
  },
  {
    id: 'soap',
    label: '07 · SOAP NOTE',
    title: 'SOAP\nNote',
    subtitle: 'Assessment & plan',
    items: [
      {
        tag: 'SUBJECTIVE',
        label: 'Summary / Subjective',
        detail: [
          'Patient\'s chief complaint in their own words',
          'SAMPLE history summary',
          'Symptoms and pain (OPQRST)',
          'What the patient tells you — not your interpretation'
        ]
      },
      {
        tag: 'OBJECTIVE',
        label: 'Observation / Objective',
        detail: [
          'Physical exam findings (Head to Toe)',
          'Vital signs with timestamps',
          'What you see, feel, and measure — factual observations only',
          'Trends in repeated vitals'
        ]
      },
      {
        tag: 'ASSESSMENT',
        label: 'Assessment',
        detail: [
          'Your working problem list — what do you think is wrong?',
          'List each problem separately (e.g. #1 suspected ankle fracture, #2 mild hypothermia)',
          'Use field diagnoses, not just symptoms',
          'Include best and worst case considerations'
        ]
      },
      {
        tag: 'PLAN',
        label: 'Plan',
        detail: [
          'Treatment for each problem on your list',
          'Evacuation decision: urgent, non-urgent, or monitor in place',
          'Evacuation method: walk out, carry, helicopter, ATV',
          'Comms plan: who contacts EMS, what info to relay',
          'Monitoring plan: recheck vitals every ___ min'
        ]
      }
    ]
  }
];

let currentPhase = 0;
let checked = {};
let startTime = null;
let timerInterval = null;

function getKey(p, i) { return `${p}-${i}`; }

function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
  renderProgress();
  renderPhase();
}

function renderProgress() {
  const track = document.getElementById('progress-track');
  track.innerHTML = PHASES.map((p, i) => {
    let cls = 'pip';
    if (i < currentPhase) cls += ' done';
    if (i === currentPhase) cls += ' active';
    return `<div class="${cls}" onclick="jumpTo(${i})"></div>`;
  }).join('');
  document.getElementById('step-counter').textContent =
    String(currentPhase + 1).padStart(2,'0') + ' / ' + String(PHASES.length).padStart(2,'0');
}

function renderPhase() {
  const phase = PHASES[currentPhase];
  const main = document.getElementById('main-content');
  const titleLines = phase.title.split('\n');

  let gateBanner = '';
  if (phase.gate) {
    const dots = phase.gate.map(c => `
      <div class="gate-condition">
        <div class="gate-dot"></div>
        <span>${c}</span>
      </div>`).join('');
    gateBanner = `
      <div class="gate-banner">
        <div class="gate-title">⚠ All three must be true to proceed</div>
        <div class="gate-conditions">${dots}</div>
        <div class="gate-footer">If any condition is NOT met — maintain precautions</div>
      </div>`;
  }

  let html = `
    <div class="phase-label">${phase.label}</div>
    <div class="phase-title">${titleLines.join('<br>')}</div>
    <div class="phase-subtitle">${phase.subtitle}</div>
    ${gateBanner}
    <div class="checklist">
  `;

  phase.items.forEach((item, i) => {
    const key = getKey(currentPhase, i);
    const isChecked = !!checked[key];
    const warnClass = item.warn ? ' warn' : '';
    const detail = item.detail.map(d => `<li>${d}</li>`).join('');
    html += `
      <div class="item${warnClass}${isChecked ? ' checked' : ''}" id="item-${i}">
        <div class="item-row">
          <div class="item-check" onclick="toggleCheck(${i}, event)">
            <svg class="unchecked-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <svg class="checked-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="item-body" onclick="toggleDetail(${i}, event)">
            <div class="item-tag">${item.tag}</div>
            <div class="item-label">${item.label}</div>
          </div>
          <div class="item-expand" onclick="toggleDetail(${i}, event)">›</div>
        </div>
        <div class="item-detail"><ul>${detail}</ul></div>
      </div>
    `;
  });

  html += `</div>`;
  main.innerHTML = html;
  main.scrollTop = 0;

  document.getElementById('btn-back').disabled = currentPhase === 0;
  document.getElementById('btn-next').textContent = currentPhase === PHASES.length - 1 ? 'DONE' : 'NEXT';
}

function toggleCheck(idx, e) {
  e.stopPropagation();
  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
  }
  const key = getKey(currentPhase, idx);
  checked[key] = !checked[key];
  const el = document.getElementById(`item-${idx}`);
  el.classList.toggle('checked', checked[key]);
}

function toggleDetail(idx, e) {
  e.stopPropagation();
  document.getElementById(`item-${idx}`).classList.toggle('open');
}

function nav(dir) {
  const next = currentPhase + dir;
  if (next < 0) return;
  if (next >= PHASES.length) { showComplete(); return; }
  currentPhase = next;
  renderProgress();
  renderPhase();
}

function jumpTo(idx) {
  currentPhase = idx;
  renderProgress();
  renderPhase();
}

function showComplete() {
  clearInterval(timerInterval);
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.getElementById('complete-screen').style.display = 'flex';
  document.getElementById('progress-track').style.display = 'none';
  updateTimer();
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  const el = document.getElementById('elapsed-time');
  if (el) el.textContent = `${m}:${s}`;
}

function resetAll() {
  clearInterval(timerInterval);
  timerInterval = null; startTime = null; checked = {};
  currentPhase = 0;
  document.getElementById('main-content').style.display = '';
  document.getElementById('footer').style.display = '';
  document.getElementById('complete-screen').style.display = 'none';
  document.getElementById('progress-track').style.display = '';
  renderProgress();
  renderPhase();
}

function reviewAll() {
  currentPhase = 0;
  document.getElementById('main-content').style.display = '';
  document.getElementById('footer').style.display = '';
  document.getElementById('complete-screen').style.display = 'none';
  document.getElementById('progress-track').style.display = '';
  renderProgress();
  renderPhase();
}

init();
</script>
</body>
</html>
